<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<title>Мапа повітряних тривог</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { margin: 0; height: 100%; background: #0d1117; font-family: system-ui, sans-serif; }
  #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(20,20,25,0.92); color: #eee; padding: 12px 16px;
    border-radius: 10px; max-width: 250px; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    font-size: 13px;
  }
  #panel h1 { font-size: 15px; margin: 0 0 10px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
  .swatch { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
  #updated { font-size: 11px; opacity: 0.6; margin-top: 10px; }
  .leaflet-popup-content-wrapper { background: #1a1a1f; color: #eee; border-radius: 8px; }
  .leaflet-popup-tip { background: #1a1a1f; }
  .popup-title { font-weight: 600; margin-bottom: 4px; }
  .popup-meta { font-size: 11px; opacity: 0.65; margin-bottom: 6px; }
  .popup-text { font-size: 13px; line-height: 1.4; max-width: 260px; }
  .popup-clear { color: #6ee7a0; font-size: 13px; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h1>Легенда</h1>
  <div class="legend-row"><span class="swatch" style="background:#dc2626;"></span>Ракетна загроза</div>
  <div class="legend-row"><span class="swatch" style="background:#a855f7;"></span>Балістична загроза</div>
  <div class="legend-row"><span class="swatch" style="background:#eab308;"></span>Загроза БПЛА</div>
  <div class="legend-row"><span class="swatch" style="background:#3b82f6;"></span>Авіація</div>
  <div class="legend-row"><span class="swatch" style="background:#65a30d;"></span>Обстріл</div>
  <div class="legend-row"><span class="swatch" style="background:#f97316;"></span>Тривога (загальна)</div>
  <div class="legend-row"><span class="swatch" style="background:transparent;border:2px dashed #b91c1c;"></span>Лінія фронту (DeepState)</div>
  <div class="legend-row"><span class="swatch" style="background:transparent;border-top:3px solid #eab308;"></span>Маршрут БПЛА</div>
  <div class="legend-row"><span class="swatch" style="background:transparent;border-top:3px solid #dc2626;"></span>Маршрут ракети</div>
  <div id="summary" style="margin-top:10px; padding-top:10px; border-top:0.5px solid rgba(255,255,255,0.15); font-size:13px;"></div>
  <div id="updated">Завантаження...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const TYPE_COLORS = {
  missile: "#dc2626",
  ballistic: "#a855f7",
  drone: "#eab308",
  aviation: "#3b82f6",
  shelling: "#65a30d",
  alert: "#f97316",
  unknown: "#8e8e93"
};

const TYPE_LABELS = {
  missile: "Ракетна загроза",
  ballistic: "Балістична загроза",
  drone: "Загроза БПЛА",
  aviation: "Авіаційна загроза",
  shelling: "Обстріл",
  alert: "Тривога",
  unknown: "Загроза (тип не визначено)"
};

const REFRESH_MS = 30000; // оновлення кожні 30 секунд

const map = L.map('map', { zoomControl: true }).setView([54, 45], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 18
}).addTo(map);

// прибираємо "обл./область/край/республіка/дужки", щоб зіставляти назви
// регіонів з GeoJSON з назвами, які видає парсер повідомлень
function normalizeRegion(name) {
  if (!name) return "";
  const cleaned = name
    .toLowerCase()
    .replace(/\(.*?\)/g, "")
    .replace(/область|обл\.?|край|республика|автономный округ|-\s*кузбасс|-\s*югра|-\s*алания|-\s*чувашия/gi, "")
    .replace(/[^а-яё\- ]/gi, "")
    .replace(/\s+/g, " ")
    .trim();
  const root = cleaned.split(" ")[0] || "";
  // прибираємо закінчення відмінка (останні 2 літери), щоб "Калужскую"
  // (знахідний відмінок) і "Калужская" (називний, офіційна назва) збігались
  return root.length > 6 ? root.slice(0, -2) : root;
}

let regionStatus = {}; // { normalizedRegionName: {type, text, channel, updated_at} }
let regionsLayer = null;
let occupiedLayer = null;
let routesLayer = null;

// та сама логіка розфарбовки і для регіонів РФ, і для окупованих областей
// України — колір з'являється, ТІЛЬКИ якщо там зараз є активна тривога
function styleByStatus(key) {
  const status = regionStatus[key];
  if (!status) {
    return { fillColor: "transparent", fillOpacity: 0, color: "#3a3a42", weight: 1 };
  }
  const color = TYPE_COLORS[status.type] || TYPE_COLORS.unknown;
  return { fillColor: color, fillOpacity: 0.5, color: color, weight: 1.5 };
}

function popupHtml(name, key, extraNote) {
  const status = regionStatus[key];
  let html = `<div class="popup-title">${name}</div>`;
  if (extraNote) html += `<div class="popup-meta">${extraNote}</div>`;
  if (!status) {
    html += `<div class="popup-clear">Активних тривог немає</div>`;
    return html;
  }
  const label = TYPE_LABELS[status.type] || TYPE_LABELS.unknown;
  const time = new Date(status.updated_at).toLocaleString('uk-UA');
  html += `
    <div class="popup-meta" style="margin-top:4px;">${label} · @${status.channel} · ${time}</div>
    <div class="popup-text">${(status.text || '').slice(0, 300)}</div>
  `;
  return html;
}

async function loadRegionsLayer() {
  const res = await fetch('russia_regions.geojson');
  const geo = await res.json();
  regionsLayer = L.geoJSON(geo, {
    style: (feature) => styleByStatus(normalizeRegion(feature.properties.region)),
    onEachFeature: (feature, layer) => {
      layer.bindPopup(() => popupHtml(feature.properties.region, normalizeRegion(feature.properties.region)));
    }
  }).addTo(map);
}

async function loadOccupiedTerritoriesLayer() {
  // адміністративні межі окупованих областей України — фарбуються ТАК САМО,
  // як регіони РФ: колір з'являється лише коли там є активна тривога
  const res = await fetch('occupied_territories.geojson');
  const geo = await res.json();
  occupiedLayer = L.geoJSON(geo, {
    style: (feature) => styleByStatus(feature.properties.match_key),
    onEachFeature: (feature, layer) => {
      layer.bindPopup(() =>
        popupHtml(feature.properties.occupied_label, feature.properties.match_key,
          "Тимчасово окупована територія України")
      );
    }
  }).addTo(map);
}

async function loadOccupiedLineLayer() {
  // точний контур лінії фронту від DeepStateMap (оновлюється щодня) —
  // суто довідковий шар, не залежить від тривог, завжди одного стилю
  const res = await fetch('occupied_line.geojson');
  const geo = await res.json();
  L.geoJSON(geo, {
    style: {
      fillColor: "transparent",
      fillOpacity: 0,
      color: "#b91c1c",
      weight: 2,
      dashArray: "6 4"
    },
    onEachFeature: (feature, layer) => {
      layer.bindPopup(
        `<div class="popup-title">Лінія фронту</div>` +
        `<div class="popup-text">Контур за даними DeepStateMap.Live, оновлюється щодня.</div>`
      );
    }
  }).addTo(map);
}

async function loadRoutesLayer() {
  const res = await fetch('routes.geojson?t=' + Date.now());
  const geo = await res.json();
  if (routesLayer) { map.removeLayer(routesLayer); }
  routesLayer = L.geoJSON(geo, {
    style: (feature) => ({
      color: TYPE_COLORS[feature.properties.type] || TYPE_COLORS.unknown,
      weight: 3,
      opacity: 0.85,
      dashArray: feature.properties.type === "drone" ? "8 5" : null
    }),
    onEachFeature: (feature, layer) => {
      const labels = (feature.properties.path_labels || []).join(" → ");
      const typeLabel = TYPE_LABELS[feature.properties.type] || TYPE_LABELS.unknown;
      const started = new Date(feature.properties.started_at).toLocaleString('uk-UA');
      const updated = new Date(feature.properties.last_updated).toLocaleString('uk-UA');
      layer.bindPopup(
        `<div class="popup-title">Маршрут: ${typeLabel}</div>` +
        `<div class="popup-text">${labels}</div>` +
        `<div class="popup-meta" style="margin-top:6px;">від ${started}<br>оновлено ${updated}</div>` +
        `<div class="popup-meta" style="margin-top:4px; opacity:0.5;">Орієнтовний маршрут за послідовністю повідомлень, не точна траєкторія</div>`
      );
    }
  }).addTo(map);
}

async function refreshRegionStatus() {
  try {
    const res = await fetch('region_status.json?t=' + Date.now());
    const raw = await res.json();
    // ключі в region_status.json вже нормалізовані бекендом (тим самим
    // алгоритмом normalizeRegion) — повторна нормалізація тут лише зайве
    // подвійне обрізання закінчення, тому просто беремо як є
    regionStatus = raw;
    if (regionsLayer) {
      regionsLayer.eachLayer(layer => layer.setStyle(styleByStatus(normalizeRegion(layer.feature.properties.region))));
    }
    if (occupiedLayer) {
      occupiedLayer.eachLayer(layer => layer.setStyle(styleByStatus(layer.feature.properties.match_key)));
    }
    const activeCount = Object.keys(regionStatus).length;

    // Головне число тут — кількість дронів/ракет, а не регіонів.
    // Якщо канал не вказав точну кількість у повідомленні — рахуємо це як
    // мінімум 1 (сам факт тривоги означає щонайменше одну ціль), інакше
    // сума виглядала б порожньою для більшості типів.
    // рахуємо ЛИШЕ точні числа, які канал сам вказав у тексті — ніяких
    // здогадок і оцінок для регіонів без вказаної кількості
    const counts = {}; // { type: knownUnits }
    for (const status of Object.values(regionStatus)) {
      if (typeof status.count === "number") {
        counts[status.type] = (counts[status.type] || 0) + status.count;
      }
    }
    const summaryHtml = Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .map(([type, total]) => {
        const color = TYPE_COLORS[type] || TYPE_COLORS.unknown;
        const label = TYPE_LABELS[type] || TYPE_LABELS.unknown;
        return `<div class="legend-row"><span class="swatch" style="background:${color};"></span>${label}: <b>${total}</b></div>`;
      })
      .join("");
    document.getElementById('summary').innerHTML =
      `<div style="opacity:0.7; margin-bottom:4px;">Кількість цілей (за точними даними каналів):</div>` +
      (summaryHtml || '<div style="opacity:0.5;">Немає повідомлень з точною кількістю</div>');

    document.getElementById('updated').textContent =
      'Оновлено: ' + new Date().toLocaleTimeString('uk-UA') + ' · активних регіонів: ' + activeCount;
    await loadRoutesLayer();
  } catch (e) {
    document.getElementById('updated').textContent = 'Помилка завантаження даних';
  }
}

(async function init() {
  await loadRegionsLayer();
  await loadOccupiedTerritoriesLayer();
  await loadOccupiedLineLayer();
  await refreshRegionStatus();
  setInterval(refreshRegionStatus, REFRESH_MS);
})();
</script>
</body>
</html>
